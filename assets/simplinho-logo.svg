<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">simplinho logo</title>
  <desc id="logo-desc">A geometric logo for the simplinho simplex solver with a simplex-inspired triangular mark and a lowercase wordmark.</desc>

  <defs>
    <linearGradient id="bg" x1="48" y1="28" x2="294" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6E8"/>
